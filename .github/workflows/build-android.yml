name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-v3-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-v3-

      - name: Cache Gradle build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
            build/app/intermediates
            build/app/outputs
          key: ${{ runner.os }}-gradle-v3-${{ hashFiles('android/build.gradle', 'android/app/build.gradle', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v3-

      - name: Cache Android SDK tools (CMake, NDK)
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/cmake
            /usr/local/lib/android/sdk/ndk
            /usr/local/lib/android/sdk/build-tools
            android/.cxx
            build/app/intermediates/cxx
          key: ${{ runner.os }}-android-sdk-cmake3.22.1-v3
          restore-keys: |
            ${{ runner.os }}-android-sdk-v3-

      - name: Get Dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Build Split Release APK (arm64 only)
        run: flutter build apk --release --split-per-abi --target-platform android-arm64

      - name: Create GH Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.VERSION }}"
          name: "MexaPresta v${{ steps.version.outputs.VERSION }}"
          body: |
            Actualización automática v${{ steps.version.outputs.VERSION }}
          files: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          make_latest: true
