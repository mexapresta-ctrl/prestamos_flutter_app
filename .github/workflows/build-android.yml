name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Cache Android CMake and NDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/cmake
            ${{ env.ANDROID_HOME }}/ndk
            android/.cxx
            build/app/intermediates/cxx
          key: ${{ runner.os }}-android-cmake-ndk-3.22.1
          restore-keys: |
            ${{ runner.os }}-android-cmake-ndk-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Split Release APK (arm64 only)
        run: flutter build apk --release --split-per-abi --target-platform android-arm64

      - name: Create GH Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Actualización a v1.0.${{ github.run_number }}"
          body: |
            - Nuevo: Splash Screen rediseñado con animaciones
            - Nuevo: Pantalla de Actualización con changelog dinámico desde GitHub
            - Fix: Corregido parpadeo en pantalla de Login al escribir
            - Mejora: APK optimizado (~60% más ligero) con R8 shrinking
          files: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          make_latest: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase JS Client
        run: npm install @supabase/supabase-js
        working-directory: .github/scripts

      - name: Update Supabase Config
        continue-on-error: true
        working-directory: .github/scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RUN_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
        run: node update_supabase.js
